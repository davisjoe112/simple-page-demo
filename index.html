<!DOCTYPE html>
<html>
<head>
    <title>Simple Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #0056b3;
            text-align: center;
            margin-top: 20px;
        }
        p {
            text-align: center;
            font-size: 18px;
        }
        .additional-content {
            margin: 20px auto;
            text-align: center;
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Welcome to Simple Page</h1>
    <p>This is a simple HTML page with added CSS styles.</p>
    <div class="additional-content">
        <p>Here is some additional content to enhance the page.</p>
        <p>Feel free to explore and enjoy the simplicity!</p>
    </div>
</body>
</html>
